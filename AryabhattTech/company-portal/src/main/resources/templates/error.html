<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/libs/bootstrap-5.0.2-dist/css/bootstrap.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            height:100vh;
            background: linear-gradient(135deg,#0d6efd,#6610f2);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card shadow-lg border-0 rounded-4 text-center p-5"
     style="max-width:500px; width:100%;">

    <div class="mb-3">
        <i class="bi bi-exclamation-triangle-fill
                  text-warning"
           style="font-size:70px;">
        </i>
    </div>
    <h1 class="display-1 fw-bold text-danger">
        404
    </h1>
    <h2 class="fw-bold mb-3">
        Page Not Found
    </h2>
    <p class="text-muted fs-5 mb-4">
        Sorry, the page you are looking for does not exist.
    </p>

    <div class="d-flex justify-content-center gap-3 flex-wrap">

        <a href="/"
           class="btn btn-primary rounded-pill px-4 py-2 fw-bold">

            <i class="bi bi-house-fill"></i>
            Home
        </a>
        <a href="/hello-world/app/view"
           class="btn btn-dark rounded-pill px-4 py-2 fw-bold">
            <i class="bi bi-grid-fill"></i>
            App View
        </a>
    </div>

</div>

</body>
</html>
